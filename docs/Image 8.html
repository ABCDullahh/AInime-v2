</div>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant/30 px-0 py-3 text-on-surface focus:ring-0 focus:border-primary-container transition-all outline-none placeholder:text-slate-700" placeholder="••••••••" type="password"/>
